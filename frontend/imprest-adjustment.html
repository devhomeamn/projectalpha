<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Imprest Adjustment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/site-icon.ico" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/inventory.css" />
  <link rel="stylesheet" href="css/imprest.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <div class="dashboard-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div id="topbar"></div>

      <section class="content imprest-page">
        <div id="pageHeaderMount"></div>

        <section class="imp-card">
          <div class="imp-toolbar">
            <label class="imp-field"><span>Base</span><select id="adjBase" class="imp-select"></select></label>
            <label class="imp-field"><span>Fiscal Year</span><select id="adjFiscalYear" class="imp-select"></select></label>
            <label class="imp-field"><span>Month</span><select id="adjMonth" class="imp-select"></select></label>
            <label class="imp-field"><span>Demand Type</span>
              <select id="adjDemandType" class="imp-select">
                <option value="">All</option>
                <option value="REGULAR">Regular</option>
                <option value="COMPLEMENTARY">Complementary</option>
              </select>
            </label>
            <label class="imp-field"><span>Pakkhik</span>
              <select id="adjPakkhik" class="imp-select">
                <option value="">All</option>
                <option value="FIRST_HALF">1st Half</option>
                <option value="SECOND_HALF">2nd Half</option>
                <option value="NONE">None</option>
              </select>
            </label>
            <div class="imp-actions">
              <button id="adjLoadBtn" class="imp-btn" type="button">Load Issued Notes</button>
              <button id="adjPrepareBtn" class="imp-btn secondary" type="button">Prepare Selected Notes</button>
            </div>
          </div>
        </section>

        <section class="imp-card">
          <div class="imp-card-head">
            <h3>Issued Note Summary</h3>
          </div>
          <div class="imp-table-wrap">
            <table class="imp-table">
              <thead>
                <tr>
                  <th style="width:90px;">Select</th>
                  <th style="width:60px;">SL</th>
                  <th style="width:190px;">Note No</th>
                  <th>Base</th>
                  <th style="width:210px;">Month / Type</th>
                  <th style="width:180px;">Dispatch No</th>
                  <th class="imp-right" style="width:130px;">Issued</th>
                  <th class="imp-right" style="width:130px;">Adjusted</th>
                  <th class="imp-right" style="width:130px;">Pending</th>
                </tr>
              </thead>
              <tbody id="adjNoteRows"></tbody>
            </table>
          </div>
        </section>

        <section class="imp-card" id="adjDetailCard" style="display:none;">
          <div class="imp-card-head">
            <div>
              <h3>Selected Notes Adjustment Entry</h3>
              <p class="imp-card-sub" id="adjSelectedLabel">No notes selected</p>
            </div>
          </div>

          <div class="imp-kpi-grid">
            <article class="imp-kpi"><p class="label">Issued Total</p><p class="value" id="adjIssuedTotal">0.00</p></article>
            <article class="imp-kpi"><p class="label">Adjusted Total</p><p class="value" id="adjAdjustedTotal">0.00</p></article>
            <article class="imp-kpi"><p class="label">Pending Total</p><p class="value" id="adjPendingTotal">0.00</p></article>
            <article class="imp-kpi"><p class="label">Rows</p><p class="value" id="adjSavedCount">0</p></article>
          </div>

          <div class="imp-grid" style="margin-top:10px;">
            <label class="imp-field"><span>Adjustment Date</span><input id="adjEntryDate" class="imp-input" type="date" /></label>
            <label class="imp-field"><span>Adjustment Ref No</span><input id="adjEntryRef" class="imp-input" /></label>
            <label class="imp-field wide" style="max-width:none;"><span>Remarks (default)</span><input id="adjEntryRemarks" class="imp-input" /></label>
          </div>
          <div class="imp-grid" style="margin-top:10px;">
            <label class="imp-field wide" style="max-width:none;">
              <span>Add Khat/Code</span>
              <select id="adjAddCode" class="imp-select">
                <option value="">Select khat/code</option>
              </select>
            </label>
            <label class="imp-field">
              <span>Adjusted Amount</span>
              <input id="adjAddAmount" class="imp-input" type="number" min="0" step="0.01" value="0" />
            </label>
            <div class="imp-actions" style="align-self:end;">
              <button id="adjAddCodeBtn" class="imp-btn secondary" type="button">Add Khat</button>
            </div>
          </div>

          <div class="imp-table-wrap" style="margin-top:10px;">
            <table class="imp-table">
              <thead>
                <tr>
                  <th style="width:60px;">SL</th>
                  <th>Khat</th>
                  <th style="width:130px;">Code</th>
                  <th class="imp-right" style="width:120px;">Issued</th>
                  <th class="imp-right" style="width:120px;">Adjusted</th>
                  <th class="imp-right" style="width:120px;">Pending</th>
                  <th class="imp-right" style="width:140px;">Add Adjustment</th>
                  <th class="imp-right" style="width:150px;">No-Issue Adjustment</th>
                  <th style="width:220px;">Remarks</th>
                </tr>
              </thead>
              <tbody id="adjEntryRows"></tbody>
            </table>
          </div>

          <div class="imp-actions" style="margin-top:10px;">
            <button id="adjSaveBtn" class="imp-btn success" type="button">Save Adjustment</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script type="module">
    import { initLayout, renderPageHeader } from "./js/layout.js";

    initLayout("imprest-adjustment.html");
    renderPageHeader({
      icon: "fact_check",
      title: "Imprest Adjustment",
      subtitle: "Adjust issued note items code-wise against dispatch and reference no.",
      showClock: true,
    });
  </script>

  <script type="module" src="js/imprest-adjustment.js"></script>
</body>
</html>
