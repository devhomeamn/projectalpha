<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Imprest Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/site-icon.ico" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/inventory.css" />
  <link rel="stylesheet" href="css/imprest.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <div class="dashboard-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div id="topbar"></div>

      <section class="content imprest-page">
        <div id="pageHeaderMount"></div>

        <section class="imp-card">
          <div class="imp-toolbar">
            <label class="imp-field"><span>Report Type</span>
              <select id="repType" class="imp-select">
                <option value="base_yearly">1. Base-wise Yearly Summary</option>
                <option value="code_yearly">2. Code-wise Yearly Summary</option>
                <option value="monthly_pakkhik">3. Monthly Pakkhik Report</option>
                <option value="dispatch_note_adjustment">4. Dispatch/Note-wise Adjustment</option>
                <option value="budget_utilization">5. Budget Utilization</option>
                <option value="adjustment_by_base">6. Adjustment by Base</option>
                <option value="adjustment_period_detail">7. Adjustment Period Detail</option>
                <option value="code_wise_details">8. Code-wise Monthly Issue</option>
              </select>
            </label>
            <label class="imp-field"><span>Base</span><select id="repBase" class="imp-select"><option value="">All</option></select></label>
            <label class="imp-field"><span>Code</span><select id="repCode" class="imp-select"><option value="">All</option></select></label>
            <label class="imp-field"><span>Fiscal Year</span><select id="repFy" class="imp-select"><option value="">All</option></select></label>
            <label class="imp-field"><span>Month</span><select id="repMonth" class="imp-select"><option value="">All</option></select></label>
            <label class="imp-field"><span>Demand Type</span>
              <select id="repDemandType" class="imp-select">
                <option value="">All</option>
                <option value="REGULAR">Regular</option>
                <option value="COMPLEMENTARY">Complementary</option>
              </select>
            </label>
            <label class="imp-field"><span>Pakkhik</span>
              <select id="repPakkhik" class="imp-select">
                <option value="">All</option>
                <option value="FIRST_HALF">1st Half</option>
                <option value="SECOND_HALF">2nd Half</option>
                <option value="NONE">None</option>
              </select>
            </label>
            <div class="imp-actions">
              <button id="repLoadBtn" class="imp-btn secondary" type="button">Load</button>
              <button id="repClearBtn" class="imp-btn secondary" type="button">Clear</button>
              <button id="repPrintBtn" class="imp-btn" type="button">Print</button>
            </div>
          </div>
        </section>

        <section class="imp-kpi-grid">
          <article class="imp-kpi"><p class="label">Rows</p><p class="value" id="repKpiRows">0</p></article>
          <article class="imp-kpi"><p class="label">Budget</p><p class="value" id="repKpiBudget">0.00</p></article>
          <article class="imp-kpi"><p class="label">Issued</p><p class="value" id="repKpiIssued">0.00</p></article>
          <article class="imp-kpi"><p class="label">Adjusted</p><p class="value" id="repKpiAdjusted">0.00</p></article>
          <article class="imp-kpi"><p class="label">Pending</p><p class="value" id="repKpiPending">0.00</p></article>
        </section>

        <section class="imp-card">
          <div class="imp-card-head">
            <div class="imp-report-title-stack">
              <p class="imp-report-office" id="repOfficeTitle">Office of the SFC Air</p>
              <p class="imp-report-section" id="repSectionTitle">Imprest Section</p>
              <h3 id="repTableTitle">Report Data</h3>
              <p id="repContext" class="imp-card-sub"></p>
            </div>
          </div>
          <div class="imp-table-wrap">
            <table class="imp-table" id="repTable">
              <thead id="repHead"></thead>
              <tbody id="repRows"></tbody>
              <tfoot id="repFoot"></tfoot>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script type="module">
    import { initLayout, renderPageHeader } from "./js/layout.js";

    initLayout("imprest-report.html");
    renderPageHeader({
      icon: "analytics",
      title: "Imprest Report",
      subtitle: "Base/code/monthly/dispatch/utilization reports from issued and adjustment data.",
      showClock: true,
    });
  </script>

  <script type="module" src="js/imprest-report.js"></script>
</body>
</html>
