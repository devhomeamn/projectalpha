<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory Items</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/site-icon.ico" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/inventory.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <div class="dashboard-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div id="topbar"></div>

      <section class="content inventory-page">
        <div id="pageHeaderMount"></div>

        <section class="inv-card">
          <div class="inv-toolbar">
            <label class="inv-field inv-field-wide">
              <span>Search</span>
              <input id="itemSearch" class="inv-input" placeholder="Code / name / category" />
            </label>

            <label class="inv-field">
              <span>Status</span>
              <select id="itemStatusFilter" class="inv-select">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </label>

            <div class="inv-actions">
              <button id="itemSearchBtn" class="inv-btn secondary" type="button">Search</button>
              <button id="itemClearBtn" class="inv-btn secondary" type="button">Clear</button>
              <button id="itemNewBtn" class="inv-btn" type="button">Add Item</button>
            </div>
          </div>
        </section>

        <section class="inv-kpi-grid">
          <article class="inv-kpi-card">
            <p class="inv-kpi-label">Total Items</p>
            <p class="inv-kpi-value" id="kpiTotalItems">0</p>
          </article>
          <article class="inv-kpi-card">
            <p class="inv-kpi-label">Active</p>
            <p class="inv-kpi-value" id="kpiActiveItems">0</p>
          </article>
          <article class="inv-kpi-card">
            <p class="inv-kpi-label">Inactive</p>
            <p class="inv-kpi-value" id="kpiInactiveItems">0</p>
          </article>
          <article class="inv-kpi-card">
            <p class="inv-kpi-label">Low Stock</p>
            <p class="inv-kpi-value" id="kpiLowStock">0</p>
          </article>
        </section>

        <section class="inv-card">
          <div class="inv-table-wrap">
            <table class="inv-table">
              <thead>
                <tr>
                  <th>SL</th>
                  <th>Code</th>
                  <th>Item Name</th>
                  <th>Category</th>
                  <th>Unit</th>
                  <th>Stock</th>
                  <th>Min Stock</th>
                  <th>Low Stock</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="itemRows"></tbody>
            </table>
          </div>

          <div class="inv-pagination">
            <button id="itemPrevBtn" class="inv-btn secondary" type="button">Prev</button>
            <div id="itemPageInfo" class="inv-page-info">Page 1 / 1</div>
            <button id="itemNextBtn" class="inv-btn secondary" type="button">Next</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="itemModal" class="inv-modal" aria-hidden="true">
    <div class="inv-modal-card narrow">
      <div class="inv-modal-head">
        <h4 id="itemModalTitle">Add Item</h4>
        <button id="itemModalClose" class="inv-close" type="button" aria-label="Close">&times;</button>
      </div>

      <form id="itemForm">
        <div class="inv-form-grid">
          <label class="inv-field">
            <span>Item Code *</span>
            <input id="itemCode" class="inv-input" required />
          </label>

          <label class="inv-field">
            <span>Item Name *</span>
            <input id="itemName" class="inv-input" required />
          </label>

          <label class="inv-field">
            <span>Category</span>
            <input id="itemCategory" class="inv-input" />
          </label>

          <label class="inv-field">
            <span>Unit</span>
            <input id="itemUnit" class="inv-input" placeholder="pcs / box / packet" />
          </label>

          <label class="inv-field">
            <span>Current Stock *</span>
            <input id="itemCurrentStock" class="inv-input" type="number" min="0" step="0.01" required />
          </label>

          <label class="inv-field">
            <span>Minimum Stock *</span>
            <input id="itemMinimumStock" class="inv-input" type="number" min="0" step="0.01" required />
          </label>

          <label class="inv-field">
            <span>Status</span>
            <select id="itemStatus" class="inv-select">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </label>

          <label class="inv-field full">
            <span>Description</span>
            <textarea id="itemDescription" class="inv-textarea" rows="3"></textarea>
          </label>
        </div>

        <div class="inv-form-actions">
          <button id="itemCancelBtn" class="inv-btn secondary" type="button">Cancel</button>
          <button id="itemSaveBtn" class="inv-btn" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initLayout, renderPageHeader } from "./js/layout.js";

    initLayout("inventory-items.html");
    renderPageHeader({
      icon: "inventory_2",
      title: "Inventory Items",
      subtitle: "Create, update, and track stock with minimum-level monitoring.",
      showClock: true,
    });
  </script>

  <script type="module" src="js/inventory-items.js"></script>
</body>
</html>
