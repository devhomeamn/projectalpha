<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory Approval</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/site-icon.ico" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/inventory.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <div class="dashboard-container">
    <div id="sidebar"></div>

    <main class="main-content">
      <div id="topbar"></div>

      <section class="content inventory-page">
        <div id="pageHeaderMount"></div>

        <section class="inv-card">
          <div class="inv-toolbar">
            <label class="inv-field inv-field-wide">
              <span>Search Requisition</span>
              <input id="apSearch" class="inv-input" placeholder="REQ-..." />
            </label>

            <label class="inv-field">
              <span>Status</span>
              <select id="apStatus" class="inv-select">
                <option value="Forwarded">Forwarded</option>
                <option value="Approved">Approved</option>
                <option value="Partially Approved">Partially Approved</option>
                <option value="Rejected">Rejected</option>
                <option value="Issued">Issued</option>
                <option value="all">All</option>
              </select>
            </label>

            <div class="inv-actions">
              <button id="apSearchBtn" class="inv-btn secondary" type="button">Search</button>
              <button id="apClearBtn" class="inv-btn secondary" type="button">Clear</button>
            </div>
          </div>
        </section>

        <section class="inv-card">
          <div class="inv-table-wrap">
            <table class="inv-table">
              <thead>
                <tr>
                  <th>SL</th>
                  <th>Requisition No</th>
                  <th>Section</th>
                  <th>Requested By</th>
                  <th>Status</th>
                  <th>Requested Qty</th>
                  <th>Forwarded At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="apRows"></tbody>
            </table>
          </div>

          <div class="inv-pagination">
            <button id="apPrevBtn" class="inv-btn secondary" type="button">Prev</button>
            <div id="apPageInfo" class="inv-page-info">Page 1 / 1</div>
            <button id="apNextBtn" class="inv-btn secondary" type="button">Next</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="apDetailModal" class="inv-modal" aria-hidden="true">
    <div class="inv-modal-card">
      <div class="inv-modal-head">
        <h4>Requisition Details</h4>
        <button id="apDetailClose" class="inv-close" type="button">&times;</button>
      </div>
      <div class="inv-detail-grid" id="apDetailGrid"></div>
      <div class="inv-table-wrap">
        <table class="inv-table">
          <thead>
            <tr>
              <th>SL</th>
              <th>Item</th>
              <th>Requested</th>
              <th>Approved</th>
              <th>Issued</th>
              <th>Line Status</th>
              <th>Remarks</th>
            </tr>
          </thead>
          <tbody id="apDetailRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="apApproveModal" class="inv-modal" aria-hidden="true">
    <div class="inv-modal-card">
      <div class="inv-modal-head">
        <h4>Approve Requisition</h4>
        <button id="apApproveClose" class="inv-close" type="button">&times;</button>
      </div>

      <form id="apApproveForm">
        <input id="apApproveId" type="hidden" />

        <div class="inv-table-wrap">
          <table class="inv-table">
            <thead>
              <tr>
                <th>SL</th>
                <th>Item</th>
                <th>Requested Qty</th>
                <th>Approved Qty</th>
                <th>Line Remarks</th>
              </tr>
            </thead>
            <tbody id="apApproveRows"></tbody>
          </table>
        </div>

        <label class="inv-field full" style="margin-top:10px;">
          <span>Header Remarks</span>
          <textarea id="apHeaderRemarks" class="inv-textarea" rows="2"></textarea>
        </label>

        <div class="inv-form-actions">
          <button id="apRejectBtn" class="inv-btn danger" type="button">Reject</button>
          <button id="apApproveCancel" class="inv-btn secondary" type="button">Cancel</button>
          <button id="apApproveSubmit" class="inv-btn success" type="submit">Approve</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initLayout, renderPageHeader } from "./js/layout.js";

    initLayout("inventory-approval.html");
    renderPageHeader({
      icon: "verified",
      title: "Inventory Approval",
      subtitle: "Approve, partially approve, or reject forwarded requisitions.",
      showClock: true,
    });
  </script>

  <script type="module" src="js/inventory-approval.js"></script>
</body>
</html>
